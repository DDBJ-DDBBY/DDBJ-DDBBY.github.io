<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小test</title>
    <style>
        body {
            font-family: "Source Han Sans SC";
            margin: 0px;
        }
        #background {
            background-image: url('src/img/background.png');
            width: 1440px;
            height: 900px;
            overflow: hidden;
            position: relative;
        }
        /* 舞台外框 */
        #panel {
            border-style: solid;
            border-width: 6px;
            border-color: rgb(107, 83, 70);
            border-radius: 55px;
            background-color: rgb(246, 201, 196);
            position: absolute;
            left: 23px;
            top: 14px;
            width: 1143px;
            height: 864px;
            z-index: 5;
        }
        /* #region 三个圆 */
        #panel .circle{
            border-width: 4px;
            border-color: rgb(107, 83, 70);
            border-style: solid;
            border-radius: 50%;
            background-color: rgb(247, 229, 231);
            position: absolute;
            width: 31px;
            height: 31px;
        }
        #panel #circle1 {
            left: 59px;
            top: 22px;
            z-index: 6;
        }
        #panel #circle2 {
            left: 116px;
            top: 22px;
            z-index: 7;
        }
        #panel #circle3 {
            left: 173px;
            top: 22px;
            z-index: 8;
        }
        /* #endregion */
        
        /* 舞台外框 */
        #panel #theater {
            border-width: 4px;
            border-color: rgb(107, 83, 70);
            border-style: solid;
            background-image: url('src/img/theaterBG.png');
            background-position: -4px -4px; 
            position: absolute;
            left: 36px;
            top: 79px;
            width: 1059px;
            height: 730px;
            z-index: 9;
        }

        /* logo */
        #logo{
            background-image: url('src/img/LOGO.png');
            width: 245px;
            height: 194px;
            position: absolute;
            left: 2px;
            top: 699px;
            z-index: 10;
        }

        /*标题*/
        #title {
            background-image: url('src/img/title.png');
            width: 687px;
            height: 170px;
            position: absolute; 
            left: 734px;
            top: 18px;
            z-index: 10;
        }

        /*幸福度外框*/
        #satisfy-square {
            border-width: 4px;
            border-color: rgb(107, 83, 70);
            border-style: solid;
            border-radius: 34px;
            background-color: rgb(255, 255, 255);
            position: absolute;
            left: 994px;
            top: 200px;
            width: 432px;
            height: 73px;
            padding: 8px;
            box-sizing: border-box;
            z-index: 10;
            overflow: hidden;
        }
        
        /* 遮罩层，覆盖padding区域 */
        #satisfy-square::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 8px solid rgb(255, 255, 255);
            border-radius: 26px;
            pointer-events: none;
            z-index: 1;
        }
        
        /*幸福度填充*/
        #satisfy-seal {
            background-color: rgb(246, 201, 196);
            border-radius: 26px;
            width: 100%;
            height: 100%;
            transition: width 0.3s ease;
            position: relative;
            z-index: 0;
        }

        /*幸福度数字*/
        #satisfy-number {
            font-family: "Source Han Sans SC Medium";
            font-weight: 500;
            font-size: 41px;
            color: rgb(107, 83, 70);
            -webkit-text-stroke: 3px rgb(255, 255, 255);
            paint-order: stroke fill;
            position: absolute;
            left: 50%;
            top: 45%;
            transform: translate(-50%, -50%);
            z-index: 11;
        }

        /*幸福度文字*/
        #txt1 {
            background-image: url('src/img/txt1.png');
            width: 115px;
            height: 39px;
            position: absolute; 
            left: 1295px;
            top: 278px;
        }

        /*按钮1*/
        #btn1 {
            background-image: url('src/img/btn1.png');
            width: 218px;
            height: 73px;
            position: absolute; 
            left: 1196px;
            top: 351px;
        }
        /*按钮2*/
        #btn2 {
            background-image: url('src/img/btn2.png');
            width: 218px;
            height: 73px;
            position: absolute; 
            left: 1196px;
            top: 456px;
        }

        /*白板*/
        #board {
            border-width: 4px;
            border-color: rgb(107, 83, 70);
            border-style: solid;
            border-radius: 34px;
            background-color: rgb(255, 255, 255);
            position: absolute;
            left: 1075px;
            top: 541px;
            width: 424px;
            height: 379px;
            z-index: 34;
        }

    </style>
</head>
<body>
    <div id="background">
        <div id="panel">
            <div id="circle1" class="circle"></div>
            <div id="circle2" class="circle"></div>
            <div id="circle3" class="circle"></div>
            <div id="theater"></div>
        </div>
        <div id="logo"></div>
        <div id="title"></div>
        <div id="satisfy-square">
            <div id="satisfy-seal"></div>
            <div id="satisfy-number">45 / 45</div>
        </div>
        <div id="txt1"></div>
        <div id="btn1"></div>
        <div id="btn2"></div>
        <div id="board"></div>
    </div>
    <script>
        let currentValue = 45;
        const maxValue = 45;
        
        const satisfyNumber = document.getElementById('satisfy-number');
        const satisfySeal = document.getElementById('satisfy-seal');
        const btn1 = document.getElementById('btn1');
        const btn2 = document.getElementById('btn2');
        
        function updateDisplay() {
            satisfyNumber.textContent = `${currentValue} / ${maxValue}`;
            const percentage = (currentValue / maxValue) * 100;
            satisfySeal.style.width = `${percentage}%`;
        }
        
        btn1.addEventListener('click', function() {
            if (currentValue < maxValue) {
                currentValue++;
                updateDisplay();
            }
        });
        
        btn2.addEventListener('click', function() {
            if (currentValue > 0) {
                currentValue--;
                updateDisplay();
            }
        });
        
        // 初始化显示
        updateDisplay();
    </script>
</body>
</html>
