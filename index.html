<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小test</title>
    <style>
        body {
            font-family: "Source Han Sans SC";
            margin: 0px;
        }
        /* 背景 */
        #background {
            background-image: url('src/img/background.png');
            width: 1440px;
            height: 900px;
            overflow: hidden;
            position: relative;
        }

        /* logo */
        #logo {
            background-image: url('src/img/LOGO.png');
            width: 245px;
            height: 194px;
            position: absolute;
            left: 2px;
            top: 699px;
            z-index: 20;
        }

        /* 场景边框 */
        .panelStyle{
            border-style: solid;
            border-width: 6px;
            border-color: rgb(107, 83, 70);
            border-radius: 55px;
            background-color: rgb(246, 201, 196);
            position: absolute;
        }

        /* 舞台外框 */
        .theater {
            border-width: 4px;
            border-color: rgb(107, 83, 70);
            border-style: solid;
            position: absolute;
            
        }

        /* 标题 幸福的小猫 */
        .title {
            background-image: url('src/img/title.png');
            width: 687px;
            height: 170px;
            position: absolute; 
        }

         /* 主场景 */
        #main {
            position: absolute;
            display: none;
        }

        /* 选择界面 */
        #select {
            position: absolute;
            /* display: none; */
        }
        /* #region 三个圆 */
        .circle {
            border-width: 4px;
            border-color: rgb(107, 83, 70);
            border-style: solid;
            border-radius: 50%;
            background-color: rgb(247, 229, 231);
            position: absolute;
            width: 31px;
            height: 31px;
        }
        .circle1 {
            left: 59px;
            top: 22px;
            z-index: 6;
        }
        .circle2 {
            left: 116px;
            top: 22px;
            z-index: 7;
        }
        .circle3 {
            left: 173px;
            top: 22px;
            z-index: 8;
        }
        /* #endregion */

        /* #region 主场景 */

        /* 主场景舞台外框 */
        #panelmain {
            left: 23px;
            top: 14px;
            width: 1143px;
            height: 860px;
            z-index: 5;
        }

        /* 主场景舞台外框 */
        #mainTheater {
            background-image: url('src/img/theaterBG.png');
            background-position: -4px -4px; 
            left: 36px;
            top: 79px;
            width: 1059px;
            height: 730px;
            z-index: 9;
        }

        /*主界面标题*/
        #mainTitle {
            left: 734px;
            top: 18px;
            z-index: 10;
        }

        /*幸福度外框*/
        #satisfy-square {
            border-width: 4px;
            border-color: rgb(107, 83, 70);
            border-style: solid;
            border-radius: 34px;
            background-color: rgb(255, 255, 255);
            position: absolute;
            left: 994px;
            top: 200px;
            width: 432px;
            height: 73px;
            padding: 8px;
            box-sizing: border-box;
            z-index: 10;
            overflow: hidden;
        }
        
        /* 遮罩层，覆盖padding区域 */
        #satisfy-square::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            border: 8px solid rgb(255, 255, 255);
            border-radius: 26px;
            pointer-events: none;
            z-index: 1;
        }
        
        /*幸福度填充*/
        #satisfy-seal {
            background-color: rgb(246, 201, 196);
            border-radius: 26px;
            width: 100%;
            height: 100%;
            transition: width 0.3s ease;
            position: relative;
            z-index: 0;
        }

        /*幸福度数字*/
        #satisfy-number {
            font-family: "Source Han Sans SC Medium";
            font-weight: 500;
            font-size: 41px;
            color: rgb(107, 83, 70);
            -webkit-text-stroke: 3px rgb(255, 255, 255);
            paint-order: stroke fill;
            position: absolute;
            left: 50%;
            top: 45%;
            transform: translate(-50%, -50%);
            z-index: 11;
        }

        /*幸福度文字*/
        #txt1 {
            background-image: url('src/img/txt1.png');
            width: 115px;
            height: 39px;
            position: absolute; 
            left: 1295px;
            top: 278px;
        }

        /*按钮1*/
        #btn1 {
            background-image: url('src/img/btn1.png');
            width: 218px;
            height: 73px;
            position: absolute; 
            left: 1196px;
            top: 351px;
        }
        /*按钮2*/
        #btn2 {
            background-image: url('src/img/btn2.png');
            width: 218px;
            height: 73px;
            position: absolute; 
            left: 1196px;
            top: 456px;
        }

        /*右下角白板*/
        #board {
            border-width: 4px;
            border-color: rgb(107, 83, 70);
            border-style: solid;
            border-radius: 34px;
            background-color: rgb(255, 255, 255);
            position: absolute;
            left: 1075px;
            top: 541px;
            width: 424px;
            height: 379px;
            z-index: 34;
        }

        /*规则说明文字1部分*/
        #role1 {
            letter-spacing: -0.3px;
            font-size: 20px;
            font-weight: 460;
            font-family: "Source Han Sans SC";
            color: rgb(165, 93, 99);
            line-height: 1.51;
            text-align: left;
            position: absolute;
            left: 24px;
            top: 12px;
            z-index: 35;
        }
        /*P样式*/
        #role1 p {
            margin: 0;
        }
        #role2 p{
            margin: 0;
        }
        /*规则说明文字2部分*/
        #role2 {
            letter-spacing: -1px;
            font-family: "Source Han Sans SC";
            color: rgb(107, 83, 70);
            text-align: left;
            position: absolute;
            line-height: 1.44;
            left: 24px;
            top: 260px;
            z-index: 35;
        }
        #role2P1 {
            font-size: 27px;
            font-weight: 450;
            left: 0px;
            top: 0px;
        }
        #role2P2 {
            font-size: 22px;
            font-weight: 400;
            left: 0px;
            top: 0px;
        }

        /* #endregion */

        /* #region 选择界面 */

        /* 选择界面外框 */
        #panelselect {
            left: 27px;
            top: 14px;
            width: 1354px;
            height: 860px;
            z-index: 5;
        }

        /* 选择界面舞台外框 猫子选择*/
        #selectTheater {
            background-color: rgb(255, 255, 255);
            position: absolute;
            left: 36px;
            top: 79px;
            width: 1270px;
            height: 730px;
            z-index: 9;
        }

        /*选择界面标题 幸福的小猫*/
        #selectTitle {
            left: 704px;
            top: 6px;
            z-index: 10;
        }

        /*选择你的小猫*/
        #txt2 {
            background-image: url("src/img/txt2.png");
            position: absolute;
            left: 45px;
            top: 30px;
            width: 235px;
            height: 39px;
            z-index: 6;
        }

        /*方案选择框*/
        .selectCatBox {
            border-style: solid;
            border-width: 5px;
            border-color: rgb(107, 83, 70);
            border-radius: 40px;
            background-color: rgb(250, 237, 236);
            position: absolute;
            width: 474px;
            height: 277px;
            z-index: 10;
        }

        /*方案选择框内白底*/
        .selectCatBlank {
            border-radius: 39px;
            background-color: rgb(255, 255, 255);
            position: absolute;
            width: 358px;
            height: 232px;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 11;
        }
        /*方案选择框内金额背景*/
        .selectCatCapsule {
            border-radius: 33.5px;
            background-color: rgb(246, 201, 196);
            position: absolute;
            width: 396px;
            height: 67px;
            left: 50%;
            top: 82%;
            transform: translate(-50%, -50%);
            z-index: 12;
        }

        /*方案选择框内幸福度上限文字*/
        .txtSatisfy {
            font-size: 25px;
            font-family: "Source Han Sans SC";
            color: rgb(165, 93, 99);
            text-align: center;
            position: absolute;
            right: 37px;
            top: 7px;
            z-index: 12;
        }

        .Price {
            font-size: 41px;
            font-family: "Source Han Sans SC";
            color: rgb(53, 47, 47);
            text-align: center;
            position: absolute;
            left: 50%;
            top: 81%;
            transform: translate(-50%, -50%);
            z-index: 13;
        }

        .imgCat {
            position: absolute;
            width: 181px;
            height: 135px;
            left: 55%;
            top: 40%;
            transform: translate(-50%, -50%) scale(0.9);
            z-index: 12;
        }


        /* #region 方案选择框位置 */

        /* 方案1外框 */
        #selectCatBox1 {
            left: 88px;
            top: 105px;
        }
        /* 方案2外框 */
        #selectCatBox2 {
            left: 693px;
            top: 105px;
        }
        /* 方案3外框 */
        #selectCatBox3 {
            left: 88px;
            top: 419px;
        }
        /* 方案4外框 */
        #selectCatBox4 {
            left: 693px;
            top: 419px;
        }

        /* #endregion */

        /* #region 方案选择框猫子 */
        
        /* 方案1 */
        #selectCatimg1 {
            background-image: url('src/img/cat3.png');
        }

        /* 方案2 */
        #selectCatimg2 {
            background-image: url('src/img/cat1.png');
        }

        /* 方案3 */
        #selectCatimg3 {
            background-image: url('src/img/cat2.png');
        }

        /* 方案4 */
        #selectCatimg4 {
            background-image: url('src/img/cat4.png');
        }

        /* #endregion */

        /* #endregion */

    </style>
</head>
<body>
    <div id="background">
        <div id="select">
            <div id="panelselect" class="panelStyle">
                <div class="circle circle1"></div>
                <div class="circle circle2"></div>
                <div class="circle circle3"></div>
                <div id="selectTheater" class="theater">
                    <div id="txt2"></div>
                    <div id="selectCatBox1" class="selectCatBox">
                        <div class="selectCatBlank"></div>
                        <div class="selectCatCapsule"></div>
                        <div class="txtSatisfy">幸福度上限<span id="txtSatisfy1">15</span>点</div>
                        <div id="selectCatimg1" class="imgCat"></div>
                        <div class="Price">机密 <span id="txtPrice1">488</span>¥</div>
                    </div>
                    <div id="selectCatBox2" class="selectCatBox">
                        <div class="selectCatBlank"></div>
                        <div class="selectCatCapsule"></div>
                        <div class="txtSatisfy">幸福度上限<span id="txtSatisfy2">30</span>点</div>
                        <div id="selectCatimg2" class="imgCat"></div>
                        <div class="Price">绝密 <span id="txtPrice2">988</span>¥</div>
                    </div>
                    <div id="selectCatBox3" class="selectCatBox">
                        <div class="selectCatBlank"></div>
                        <div class="selectCatCapsule"></div>
                        <div class="txtSatisfy">幸福度上限<span id="txtSatisfy3">50</span>点</div>
                        <div id="selectCatimg3" class="imgCat"></div>
                        <div class="Price">绝密 <span id="txtPrice3">1588</span>¥</div>
                    </div>
                    <div id="selectCatBox4" class="selectCatBox">
                        <div class="selectCatBlank"></div>
                        <div class="selectCatCapsule"></div>
                        <div class="txtSatisfy">幸福度上限<span id="txtSatisfy4">70</span>点</div>
                        <div id="selectCatimg4" class="imgCat"></div>
                        <div class="Price">绝密 <span id="txtPrice4">2188</span>¥</div>
                    </div>
                </div>
            </div>
            <div id="selectTitle" class="title"></div>
        </div>
        <div id="main">
            <div id="panelmain" class="panelStyle">
                <div class="circle circle1"></div>
                <div class="circle circle2"></div>
                <div class="circle circle3"></div>
                <div id="mainTheater" class="theater"></div>
            </div>
            <div id="mainTitle" class="title"></div>
            <div id="satisfy-square">
                <div id="satisfy-seal"></div>
                <div id="satisfy-number">0 / 15</div>
            </div>
            <div id="txt1"></div>
            <div id="btn1"></div>
            <div id="btn2"></div>
            <div id="board">
                <div id="role1">
                    <p>幸福度规则：</p>
                    <p>达到下限 每撤离每获100万 幸福度+1</p>
                    <p>出2x3大红 幸福度+1</p>
                    <p>出3x3大红 幸福度+3</p>
                    <p>出心/泪/大于500万3x3/赛季炫彩/特</p>
                    <p>殊收集品（包括但不限于手弩塞伊德）</p>
                    <p>幸福度 +5 </p>
                    <p>幸福度满了则结单</p>
                </div>
                <div id="role2">
                    <p id="role2P1"><span id="role2txt1">机密</span> · <span id="role2txt2">200</span>万撤离为下限</p>
                    <p id="role2P2">撤离失败 -2点 幸福度（上限<span id="role2txt3">6</span>点）</p>
                </div>
            </div>
        </div>
        <div id="logo"></div>
    </div>
    <script>
        let currentValue = 0;
        let maxValue = 15;

        const satisfyNumber = document.getElementById('satisfy-number');
        const satisfySeal = document.getElementById('satisfy-seal');
        const btn1 = document.getElementById('btn1');
        const btn2 = document.getElementById('btn2');
        const selectDiv = document.getElementById('select');
        const mainDiv = document.getElementById('main');

        // 各档位配置
        const catOptions = {
            1: { role2txt1: '机密', role2txt2: '200', role2txt3: '6',  maxValue: 15 },
            2: { role2txt1: '绝密', role2txt2: '600', role2txt3: '15', maxValue: 30 },
            3: { role2txt1: '绝密', role2txt2: '600', role2txt3: '20', maxValue: 50 },
            4: { role2txt1: '绝密', role2txt2: '600', role2txt3: '30', maxValue: 70 },
        };

        function updateDisplay() {
            satisfyNumber.textContent = `${currentValue} / ${maxValue}`;
            const percentage = (currentValue / maxValue) * 100;
            satisfySeal.style.width = `${percentage}%`;
        }

        function selectCat(optionId) {
            const opt = catOptions[optionId];
            // 更新文字
            document.getElementById('role2txt1').textContent = opt.role2txt1;
            document.getElementById('role2txt2').textContent = opt.role2txt2;
            document.getElementById('role2txt3').textContent = opt.role2txt3;
            // 更新幸福度
            maxValue = opt.maxValue;
            currentValue = 0;
            updateDisplay();
            // 切换界面
            selectDiv.style.display = 'none';
            mainDiv.style.display = 'block';
        }

        // 绑定4个选择框的点击事件
        for (let i = 1; i <= 4; i++) {
            document.getElementById('selectCatBox' + i).addEventListener('click', function() {
                selectCat(i);
            });
        }

        btn1.addEventListener('click', function() {
            if (currentValue < maxValue) {
                currentValue++;
                updateDisplay();
            }
        });

        btn2.addEventListener('click', function() {
            if (currentValue > 0) {
                currentValue--;
                updateDisplay();
            }
        });

        // 初始化显示
        updateDisplay();
    </script>
</body>
</html>
