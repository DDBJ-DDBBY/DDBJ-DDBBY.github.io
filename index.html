    <script>
        let currentValue = 0;
        let maxValue = 15;
        let decreaseLimit = 6;
        let decreasePerClick = 2;
        let currentDecreasedAmount = 0;
        let hasShownDecreaseNotice = false;
        let hasPlayedMaxSound = false;
        let hasAudioUnlocked = false;
        let isDecreaseBlockedByNotice = false;
        let isBtn2ListenerBound = false;
        let isActionLocked = false;
        let isDecisionActive = false;
        let debugEnabled = false;
        let debugLogLines = [];
        const DEBUG_LOG_MAX = 10;

        // Cookie 工具
        function setCookie(name, value, days) {
            const expires = new Date(Date.now() + days * 864e5).toUTCString();
            document.cookie = name + '=' + encodeURIComponent(value) + '; expires=' + expires + '; path=/; SameSite=Lax';
        }
        function getCookie(name) {
            const match = document.cookie.match(new RegExp('(?:^|; )' + name.replace(/[-[\]{}()*+?.,\\^$|#\s]/g, '\\$&') + '=([^;]*)'));
            return match ? decodeURIComponent(match[1]) : null;
        }
        function clearGameCookies() {
            ['catState_optionId','catState_currentValue','catState_decreasedAmount','catState_hasNotice','catState_btn2Active','catState_hasPlayedMaxSound'].forEach(function(n) {
                document.cookie = n + '=; expires=Thu, 01 Jan 1970 00:00:00 GMT; path=/; SameSite=Lax';
            });
        }
        function saveState() {
            setCookie('catState_optionId', selectedOptionId, 30);
            setCookie('catState_currentValue', currentValue, 30);
            setCookie('catState_decreasedAmount', currentDecreasedAmount, 30);
            setCookie('catState_hasNotice', hasShownDecreaseNotice, 30);
            setCookie('catState_btn2Active', isBtn2ListenerBound, 30);
            setCookie('catState_hasPlayedMaxSound', hasPlayedMaxSound, 30);
        }

        const debugPanel = document.getElementById('debugPanel');
        const debugLogEl = document.getElementById('debugLog');
        const debugToggle = document.getElementById('debugToggle');

        function debugLog(msg) {
            if (!debugEnabled) return;
            const ts = (performance.now() / 1000).toFixed(2);
            debugLogLines.push('[' + ts + 's] ' + msg);
            if (debugLogLines.length > DEBUG_LOG_MAX) debugLogLines.shift();
            debugLogEl.textContent = debugLogLines.join('\n');
        }

        function updateDebugPanel() {
            if (!debugEnabled) return;
            debugPanel.textContent = [
                '── 状态 ──────────────────',
                'actorState    : ' + actorState,
                'isActionLocked: ' + isActionLocked,
                'isDecisionAct : ' + isDecisionActive,
                'decisionTimer : ' + (decisionTimerId !== null ? '运行中' : '无'),
                '── 位置 ──────────────────',
                'left          : ' + actorLeft.toFixed(1) + '  (bounds: ' + actorBounds.leftMin + '~' + actorBounds.leftMax + ')',
                'top           : ' + actorTop.toFixed(1) + '  (bounds: ' + actorBounds.topMin + '~' + actorBounds.topMax + ')',
                'facing        : ' + actorFacing,
                '── 动画帧 ────────────────',
                'idleFrame     : ' + idleFrameNumber,
                'walkToken     : ' + walkToken,
                'actionToken   : ' + actionToken,
            ].join('\n');
        }

        debugToggle.addEventListener('click', function() {
            debugEnabled = !debugEnabled;
            debugPanel.style.display = debugEnabled ? 'block' : 'none';
            debugLogEl.style.display = debugEnabled ? 'block' : 'none';
            debugToggle.style.color = debugEnabled ? '#0f0' : '#aaa';
            debugLogLines = [];
            if (debugEnabled) updateDebugPanel();
        });

        const satisfyNumber = document.getElementById('satisfy-number');
        const satisfySeal = document.getElementById('satisfy-seal');
        const btn1 = document.getElementById('btn1');
        const btn2 = document.getElementById('btn2');
        const btnClose = document.getElementById('btnClose');
        const notice = document.getElementById('notice');
        const logo = document.getElementById('logo');
        const resetBtn = document.getElementById('reset');
        const selectDiv = document.getElementById('select');
        const mainDiv = document.getElementById('main');
        const background = document.getElementById('background');
        const mainTheater = document.getElementById('mainTheater');
        const temp = document.getElementById('Temp');
        const AUDIO_VOLUME = 0.25;

        const hoverAudio = new Audio('src/sound/sound1.mp3');
        const clickAudio = new Audio('src/sound/sound2.mp3');
        const maxAudio = new Audio('src/sound/max.mp3');
        [hoverAudio, clickAudio, maxAudio].forEach(function(a) {
            a.volume = AUDIO_VOLUME;
            a.preload = 'auto';
        });

        const audioCtx = window.AudioContext ? new AudioContext() : null;

        function primeAudio(audio) {
            const probe = new Audio(audio.src);
            probe.volume = 0;
            probe.preload = 'auto';
            const p = probe.play();
            if (p && typeof p.then === 'function') {
                p.then(function() {
                    probe.pause();
                    probe.currentTime = 0;
                }).catch(function() {});
            }
        }

        function unlockAudio() {
            if (hasAudioUnlocked) return;
            hasAudioUnlocked = true;
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume().catch(function() {});
            }
            [hoverAudio, clickAudio, maxAudio].forEach(primeAudio);
        }

        function installAudioUnlockGesture() {
            function onFirstGesture() {
                unlockAudio();
            }
            document.addEventListener('pointerdown', onFirstGesture, { once: true, passive: true });
            document.addEventListener('keydown', onFirstGesture, { once: true });
            document.addEventListener('touchstart', onFirstGesture, { once: true, passive: true });
        }

        function playFallbackBeep(type) {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const isMax = type === 'max';
            osc.type = isMax ? 'triangle' : 'sine';
            osc.frequency.setValueAtTime(isMax ? 880 : 560, now);
            gain.gain.setValueAtTime(0.0001, now);
            gain.gain.exponentialRampToValueAtTime((isMax ? 0.08 : 0.04) * AUDIO_VOLUME, now + 0.01);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + (isMax ? 0.22 : 0.1));
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + (isMax ? 0.24 : 0.12));
        }

        function playAudio(audio, fallbackType) {
            if (!audio || !audio.src) return;
            if (!hasAudioUnlocked) return;
            const player = new Audio(audio.src);
            player.volume = AUDIO_VOLUME;
            player.preload = 'auto';
            player.play().catch(function(err) {
                console.warn('音效播放失败，可能是浏览器不支持当前格式：', audio.src, err && err.message ? err.message : err);
                playFallbackBeep(fallbackType);
            });
        }

        function bindInteractiveEffects() {
            const targets = [
                btn1,
                btn2,
                btnClose,
                resetBtn,
                document.getElementById('selectCatBox1'),
                document.getElementById('selectCatBox2'),
                document.getElementById('selectCatBox3'),
                document.getElementById('selectCatBox4'),
            ];

            targets.forEach(function(el) {
                if (!el) return;
                el.classList.add('interactiveButton');
                el.addEventListener('mouseenter', function() {
                    if (!hasAudioUnlocked) return;
                    playAudio(hoverAudio, 'hover');
                });
                el.addEventListener('click', function() {
                    unlockAudio();
                    playAudio(clickAudio, 'click');
                });
            });
        }

        function tryPlayMaxSound() {
            if (currentValue >= maxValue && !hasPlayedMaxSound) {
                hasPlayedMaxSound = true;
                unlockAudio();
                playAudio(maxAudio, 'max');
                saveState();
            }
        }

        const catCanvas = document.createElement('canvas');
        catCanvas.width = 400;
        catCanvas.height = 400;
        catCanvas.style.width = '400px';
        catCanvas.style.height = '400px';
        temp.innerHTML = '';
        temp.appendChild(catCanvas);
        const catCtx = catCanvas.getContext('2d');

        const actorBounds = {
            leftMin: 125,
            leftMax: 520,
            topMin: 255,
            topMax: 406,
        };

        const catPrefixByOption = {
            1: 'cat3',
            2: 'cat1',
            3: 'cat2',
            4: 'cat4',
        };

        let selectedOptionId = 1;
        let idleFrameNumber = 1;
        let actorFacing = 'left';
        let actorState = 'idle';
        let actorLeft = 343;
        let actorTop = 317;
        let decisionTimerId = null;
        let walkToken = 0;
        let actionToken = 0;
        let currentFrames = {};
        const frameCache = {};

        // 各档位配置
        const catOptions = {
            1: { role2txt1: '机密', role2txt2: '200', role2txt3: '6', role2txt4: '-2', maxValue: 15 },
            2: { role2txt1: '绝密', role2txt2: '600', role2txt3: '15', role2txt4: '-3', maxValue: 30 },
            3: { role2txt1: '绝密', role2txt2: '600', role2txt3: '24', role2txt4: '-3', maxValue: 50 },
            4: { role2txt1: '绝密', role2txt2: '600', role2txt3: '30', role2txt4: '-3', maxValue: 70 },
        };

        function updateDisplay() {
            satisfyNumber.textContent = `${currentValue} / ${maxValue}`;
            const percentage = Math.max((currentValue / maxValue) * 100, 0);
            satisfySeal.style.width = `${percentage}%`;
        }

        function setActorPosition(left, top) {
            actorLeft = Math.min(Math.max(left, actorBounds.leftMin), actorBounds.leftMax);
            actorTop = Math.min(Math.max(top, actorBounds.topMin), actorBounds.topMax);
            temp.style.left = `${actorLeft}px`;
            temp.style.top = `${actorTop}px`;
        }

        function drawFrame(frameNumber) {
            const img = currentFrames[frameNumber];
            if (!img) {
                return;
            }

            catCtx.clearRect(0, 0, catCanvas.width, catCanvas.height);
            if (actorFacing === 'right') {
                catCtx.save();
                catCtx.translate(catCanvas.width, 0);
                catCtx.scale(-1, 1);
                catCtx.drawImage(img, 0, 0, catCanvas.width, catCanvas.height);
                catCtx.restore();
                return;
            }

            catCtx.drawImage(img, 0, 0, catCanvas.width, catCanvas.height);
        }

        function loadCatFrames(optionId) {
            if (frameCache[optionId]) {
                return Promise.resolve(frameCache[optionId]);
            }

            const prefix = catPrefixByOption[optionId];
            const frames = {};
            const promises = [];

            for (let i = 1; i <= 10; i++) {
                const img = new Image();
                frames[i] = img;
                promises.push(new Promise(function(resolve) {
                    img.onload = resolve;
                    img.onerror = resolve;
                }));
                img.src = `src/img/mimi/${prefix}-${i}.png`;
            }

            return Promise.all(promises).then(function() {
                frameCache[optionId] = frames;
                return frames;
            });
        }

        function enterIdle() {
            actorState = 'idle';
            drawFrame(idleFrameNumber);
            debugLog('enterIdle → 1s后决策');
            updateDebugPanel();
            if (isDecisionActive) {
                scheduleDecision(1000);
            }
        }

        function cancelWalk() {
            walkToken++;
        }

        function cancelDecision() {
            if (decisionTimerId) {
                clearTimeout(decisionTimerId);
                decisionTimerId = null;
            }
        }

        function scheduleDecision(delay) {
            cancelDecision();
            debugLog('scheduleDecision delay=' + delay + 'ms');
            decisionTimerId = setTimeout(function() {
                decisionTimerId = null;
                if (actorState !== 'idle' || isActionLocked) {
                    debugLog('决策跳过 state=' + actorState + ' locked=' + isActionLocked + '，100ms后重试');
                    updateDebugPanel();
                    scheduleDecision(100);
                    return;
                }
                const roll = Math.random();
                const willWalk = roll < 0.25;
                debugLog('掷骰 ' + roll.toFixed(3) + ' → ' + (willWalk ? '触发walk' : '跳过(re-schedule 2s)'));
                if (willWalk) {
                    startWalk();
                } else {
                    scheduleDecision(2000);
                }
            }, delay);
            updateDebugPanel();
        }

        function startWalk() {
            if (actorState !== 'idle' || isActionLocked) {
                return;
            }

            cancelDecision();
            actorState = 'walk';
            const localToken = ++walkToken;
            const startLeft = actorLeft;
            const startTop = actorTop;

            const speed = 60;
            const nominalDuration = 1000 + Math.random() * 1500;
            const nominalDistance = speed * (nominalDuration / 1000);
            const angle = Math.random() * Math.PI * 2;

            const clampedLeft = Math.min(
                Math.max(startLeft + Math.cos(angle) * nominalDistance, actorBounds.leftMin),
                actorBounds.leftMax
            );
            const clampedTop = Math.min(
                Math.max(startTop + Math.sin(angle) * nominalDistance, actorBounds.topMin),
                actorBounds.topMax
            );

            const deltaLeft = clampedLeft - startLeft;
            const deltaTop = clampedTop - startTop;
            const actualDistance = Math.sqrt(deltaLeft * deltaLeft + deltaTop * deltaTop);

            if (actualDistance < 1) {
                debugLog('walk取消: actualDistance<1');
                enterIdle();
                return;
            }

            const duration = (actualDistance / speed) * 1000;
            debugLog('walk开始 dist=' + actualDistance.toFixed(1) + ' dur=' + duration.toFixed(0) + 'ms angle=' + (angle * 180 / Math.PI).toFixed(0) + '°');
            updateDebugPanel();

            if (deltaLeft > 0) {
                actorFacing = 'right';
            } else if (deltaLeft < 0) {
                actorFacing = 'left';
            }

            const startTime = performance.now();
            let lastWalkFrame = 1;

            function walkStep(now) {
                if (localToken !== walkToken || actorState !== 'walk') {
                    return;
                }

                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                setActorPosition(
                    startLeft + deltaLeft * progress,
                    startTop + deltaTop * progress
                );

                const frameSwitch = Math.floor(elapsed / 160) % 2;
                lastWalkFrame = frameSwitch === 0 ? 1 : 2;
                drawFrame(lastWalkFrame);

                if (progress < 1) {
                    requestAnimationFrame(walkStep);
                    return;
                }

                idleFrameNumber = lastWalkFrame;
                enterIdle();
            }

            requestAnimationFrame(walkStep);
        }



        function playActionAnimation(type) {
            if (isActionLocked) {
                return;
            }

            isActionLocked = true;
            cancelWalk();
            cancelDecision();

            const localToken = ++actionToken;
            actorState = type;
            const frames = type === 'happy' ? [2, 3, 4, 5, 6, 7, 6, 7, 6] : [8, 9, 10];
            let frameIndex = 0;

            drawFrame(frames[frameIndex]);
            const frameTimer = setInterval(function() {
                if (localToken !== actionToken) {
                    clearInterval(frameTimer);
                    return;
                }

                frameIndex++;
                if (frameIndex >= frames.length) {
                    clearInterval(frameTimer);
                    setTimeout(function() {
                        if (localToken !== actionToken) return;
                        enterIdle();
                    }, 500);
                    setTimeout(function() {
                        if (localToken !== actionToken) return;
                        isActionLocked = false;
                    }, 2000);
                    return;
                }

                drawFrame(frames[frameIndex]);
            }, 140);
        }

        function applySelectedCatFrames(optionId) {
            return loadCatFrames(optionId).then(function(frames) {
                currentFrames = frames;
                idleFrameNumber = 1;
                setActorPosition(actorLeft, actorTop);
                enterIdle();
            });
        }

        function selectCat(optionId) {
            const opt = catOptions[optionId];
            selectedOptionId = optionId;
            // 更新文字
            document.getElementById('role2txt1').textContent = opt.role2txt1;
            document.getElementById('role2txt2').textContent = opt.role2txt2;
            document.getElementById('role2txt3').textContent = opt.role2txt3;
            document.getElementById('role2txt4').textContent = opt.role2txt4;
            // 更新幸福度
            maxValue = opt.maxValue;
            decreaseLimit = Number(opt.role2txt3);
            decreasePerClick = Math.abs(Number(opt.role2txt4));
            currentDecreasedAmount = 0;
            currentValue = 0;
            updateDisplay();

            isDecisionActive = true;
            applySelectedCatFrames(optionId);

            // 切换界面
            selectDiv.style.display = 'none';
            mainDiv.style.display = 'block';
            resetBtn.style.display = 'flex';

            if (!isBtn2ListenerBound) {
                btn2.addEventListener('click', handleBtn2Click);
                isBtn2ListenerBound = true;
            }

            saveState();
        }

        // 绑定4个选择框的点击事件
        for (let i = 1; i <= 4; i++) {
            document.getElementById('selectCatBox' + i).addEventListener('click', function() {
                selectCat(i);
            });
        }

        btn1.addEventListener('click', function() {
            if (currentValue < maxValue) {
                currentValue++;
                updateDisplay();
                tryPlayMaxSound();
                saveState();
                if (!isActionLocked) {
                    playActionAnimation('happy');
                }
            }
        });

        function handleBtn2Click() {
            if (!hasShownDecreaseNotice) {
                hasShownDecreaseNotice = true;
                isDecreaseBlockedByNotice = true;
                notice.style.display = 'block';
                saveState();
                return;
            }

            if (isDecreaseBlockedByNotice) {
                return;
            }

            if (currentDecreasedAmount + decreasePerClick > decreaseLimit) {
                btn2.removeEventListener('click', handleBtn2Click);
                isBtn2ListenerBound = false;
                saveState();
                return;
            }

            currentValue -= decreasePerClick;
            currentDecreasedAmount += decreasePerClick;
            updateDisplay();
            if (!isActionLocked) {
                playActionAnimation('sad');
            }

            if (currentDecreasedAmount >= decreaseLimit) {
                btn2.removeEventListener('click', handleBtn2Click);
                isBtn2ListenerBound = false;
            }
            saveState();
        }

        btn2.addEventListener('click', handleBtn2Click);
        isBtn2ListenerBound = true;

        btnClose.addEventListener('click', function() {
            notice.style.display = 'none';
            isDecreaseBlockedByNotice = false;
        });

        logo.addEventListener('click', function() {
            window.open('https://sc4gudh4skuka.hbjump.com/sp66ueq0qg6e5', '_blank', 'noopener,noreferrer');
        });

        function applyResponsiveScale() {
            const baseWidth = 1440;
            const baseHeight = 900;
            const scale = Math.min(window.innerWidth / baseWidth, window.innerHeight / baseHeight);
            background.style.transform = `translate(-50%, -50%) scale(${scale})`;
        }

        window.addEventListener('resize', applyResponsiveScale);

        // 重置按钮
        resetBtn.addEventListener('click', function() {
            clearGameCookies();
            // 停止动画
            isDecisionActive = false;
            cancelDecision();
            cancelWalk();
            actionToken++;
            isActionLocked = false;
            // 重置状态
            currentValue = 0;
            maxValue = 15;
            decreaseLimit = 6;
            decreasePerClick = 2;
            currentDecreasedAmount = 0;
            hasShownDecreaseNotice = false;
            hasPlayedMaxSound = false;
            isDecreaseBlockedByNotice = false;
            notice.style.display = 'none';
            // 恢复 btn2 监听
            if (!isBtn2ListenerBound) {
                btn2.addEventListener('click', handleBtn2Click);
                isBtn2ListenerBound = true;
            }
            updateDisplay();
            // 切换回选择界面
            mainDiv.style.display = 'none';
            selectDiv.style.display = 'block';
            resetBtn.style.display = 'none';
        });

        // 从 Cookie 恢复状态
        function loadState() {
            const savedOptionId = getCookie('catState_optionId');
            if (!savedOptionId) return;
            // 先读取所有 Cookie 值——selectCat 末尾调用 saveState 会把 Cookie 覆盖为零，须提前读出
            const optId = Number(savedOptionId);
            const savedValue = getCookie('catState_currentValue');
            const savedDecreased = getCookie('catState_decreasedAmount');
            const savedHasNotice = getCookie('catState_hasNotice');
            const savedBtn2Active = getCookie('catState_btn2Active');
            const savedHasPlayedMaxSound = getCookie('catState_hasPlayedMaxSound');
            // 调用 selectCat 初始化界面和动画，再用保存的真实值覆盖归零的状态
            selectCat(optId);
            if (savedValue !== null) currentValue = Number(savedValue);
            if (savedDecreased !== null) currentDecreasedAmount = Number(savedDecreased);
            if (savedHasNotice === 'true') hasShownDecreaseNotice = true;
            if (savedHasPlayedMaxSound === 'true') hasPlayedMaxSound = true;
            if (savedBtn2Active === 'false') {
                btn2.removeEventListener('click', handleBtn2Click);
                isBtn2ListenerBound = false;
            }
            updateDisplay();
            saveState(); // 用真实值重新写回 Cookie
        }

        // 初始化显示
        installAudioUnlockGesture();
        bindInteractiveEffects();
        applyResponsiveScale();
        // 预加载所有方案的帧，避免选择时出现等待
        [1, 2, 3, 4].forEach(function(id) { loadCatFrames(id); });
        // 尝试从 Cookie 恢复，否则走默认初始化
        if (getCookie('catState_optionId')) {
            loadState();
        } else {
            updateDisplay();
            setActorPosition(actorLeft, actorTop);
            applySelectedCatFrames(selectedOptionId);
        }
    </script>
</body>
</html>
